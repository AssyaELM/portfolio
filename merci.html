<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message envoyé — Assia El Mourtadah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#05030f; color:#e6e9ff; font-family:'JetBrains Mono', monospace;
    background-image:radial-gradient(circle at 50% 30%, rgba(0,240,255,.07), transparent 60%);
    padding:24px; text-align:center;
  }
  .card{
    max-width:560px; padding:48px 36px; border-radius:14px;
    background:rgba(10,8,30,.72); border:1px solid rgba(0,240,255,.25);
    box-shadow:0 0 40px rgba(0,240,255,.12);
  }
  .check{ font-size:3rem; }
  h1{
    font-family:'Orbitron', sans-serif; font-size:1.5rem; margin:18px 0 12px;
    background:linear-gradient(90deg, #00f0ff, #ff2ea6);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  p{ color:#9aa0cf; line-height:1.7; }
  .prompt{ color:#3dff8e; margin-top:22px; font-size:.95rem; }
  a.btn{
    display:inline-block; margin-top:28px; padding:12px 26px; border-radius:8px;
    color:#05030f; background:#00f0ff; text-decoration:none; font-weight:700;
    box-shadow:0 0 18px rgba(0,240,255,.45); transition:transform .15s;
  }
  a.btn:hover{ transform:translateY(-2px); }
</style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Message envoyé !</h1>
    <p>Merci de m'avoir contactée. Votre message a bien été transmis — je vous répondrai dès que possible.</p>
    <p class="prompt">assia@ensa-fes:~$ send --status OK_</p>
    <a class="btn" href="/">← Retour au portfolio</a>
  </div>
</body>
</html>
